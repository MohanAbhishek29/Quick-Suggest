version: '3.8'

services:
  backend1:
    build: .
    ports:
      - "8081:8080"
      
  backend2:
    build: .
    ports:
      - "8082:8080"

  backend3:
    build: .
    ports:
      - "8083:8080"

  loadbalancer:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend1
      - backend2
      - backend3
